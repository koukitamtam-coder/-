<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tip Goal</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
}

/* الدائرة */
.circle {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(138, 43, 226, 0.8);
  border: 3px solid #a855f7;
}

/* المي */
.liquid {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0%;
  background: #a855f7;
  transition: height 0.5s ease;
}

/* الموجة */
.liquid::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  top: -150%;
  left: -50%;
  background: rgba(255,255,255,0.2);
  border-radius: 40%;
  animation: wave 4s linear infinite;
}

/* حركة الموج */
@keyframes wave {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* النص */
.text {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: bold;
  font-size: 20px;
  text-shadow: 0 0 10px rgba(0,0,0,0.5);
}
</style>

</head>

<body>

<div class="circle">
  <div class="liquid" id="liquid"></div>
  <div class="text" id="text">$0 / 777</div>
</div>

<script>
let current = 0;
let goal = 777;

function start() {
  const liquid = document.getElementById("liquid");
  const text = document.getElementById("text");

  if (!liquid || !text) {
    setTimeout(start, 500); // يرجع يجرب
    return;
  }

  // تصفير
  liquid.style.height = "0%";
  text.innerText = "$0 / 777";

  // تجربة وهمية
  setInterval(() => {
    current += 10;

    if (current > goal) current = goal;

    let percent = (current / goal) * 100;
    liquid.style.height = percent + "%";
    text.innerText = $${current} / ${goal};
  }, 1500);
}

start();
</script>
